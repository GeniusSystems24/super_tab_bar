name: super_tab_bar
description: >
  A browser-style Flutter workspace tab bar with pinned, dirty, closable,
  unique, and required-pinned tabs. Supports per-tab page builders,
  drag-to-reorder, context menus, overflow dropdowns, hover previews,
  state-preserving pages, localization, callbacks, accessibility, RTL,
  dirty-aware back navigation, responsive compact mode, draggable mobile
  thumbnail previews, optional compact FAB, and automatic breakpoint
  switching. Zero third-party dependencies.


# package version
version: 2.7.2

# package homepage, repository, and issue tracker URLs
homepage: https://github.com/GeniusSystems24/super_tab_bar
repository: https://github.com/GeniusSystems24/super_tab_bar
issue_tracker: https://github.com/GeniusSystems24/super_tab_bar/issues

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation — provides SuperPalette,
  # SuperMaterialThemeData, and SuperThemeData for automatic light/dark theming.
  # v1.1.0 adds SuperMaterialThemeData.maybeOf + SuperTabBarThemeData
  # .fromMaterialTheme, both used by this package.
  super_core: ">=2.1.0 <3.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
