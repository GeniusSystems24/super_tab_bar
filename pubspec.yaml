name: super_tab_bar
description: >
  A browser-style Flutter tab bar with pinned, dirty, and closable tabs;
  configurable behaviors (requiredPinned, normal, uniqueNormal); drag-to-reorder;
  context menus; overflow handling; live hover previews; state-preserving pages; 
  localization; event callbacks; accessibility; mobile compact switching with draggable thumbnails; 
  dirty-aware back navigation; auto compact breakpoints (allowAutoCompact, compactWidth); RTL; and zero third-party dependencies.

version: 2.2.0

homepage: https://github.com/GeniusSystems24/super_tab_bar
repository: https://github.com/GeniusSystems24/super_tab_bar
issue_tracker: https://github.com/GeniusSystems24/super_tab_bar/issues

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
