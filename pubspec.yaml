name: super_tab_bar
description: >
  A browser-style workspace tab bar for Flutter — pinned / dirty / closable
  tabs with configurable behavior types (requiredPinned, normal, uniqueNormal),
  drag-to-reorder, context menu, overflow dropdown, live mini-page previews on
  hover, state-preserving pages, localization support, direct event callbacks,
  accessibility semantics, a mobile compact-mode tab switcher with draggable
  thumbnail previews, dirty-aware back navigation, and RTL. Zero third-party deps.
version: 2.1.0
homepage: https://github.com/GeniusSystems24/super_tab_bar
repository: https://github.com/GeniusSystems24/super_tab_bar
issue_tracker: https://github.com/GeniusSystems24/super_tab_bar/issues

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
