name: super_tab_bar
description: >
  A browser-style Flutter workspace tab bar with pinned, dirty, closable,
  unique, and required-pinned tabs. Supports drag-to-reorder, context menus,
  overflow dropdowns, hover previews, state-preserving pages, localization,
  callbacks, accessibility, RTL, dirty-aware back navigation, responsive
  compact mode, draggable mobile thumbnail previews, optional compact FAB,
  and automatic breakpoint switching. Zero third-party dependencies.


version: 2.3.0

homepage: https://github.com/GeniusSystems24/super_tab_bar
repository: https://github.com/GeniusSystems24/super_tab_bar
issue_tracker: https://github.com/GeniusSystems24/super_tab_bar/issues

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
